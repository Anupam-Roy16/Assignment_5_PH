<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
    <!-- font-awesome integrate-->
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
      integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
      crossorigin="anonymous"
      referrerpolicy="no-referrer"
    />

    <!-- font-integrate -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Geist:wght@100..900&display=swap"
      rel="stylesheet"
    />

    <!-- tailwid+daisyui -->
    <link
      href="https://cdn.jsdelivr.net/npm/daisyui@5"
      rel="stylesheet"
      type="text/css"
    />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <style>
      * {
        font-family: "Geist", sans-serif;
      }
      .active {
        background-color: #422ad5;
        color: white;
      }
    </style>
  </head>
  <body>
    <!-- Navbar -->
    <div
      class="w-11/12 mx-auto flex justify-between navbar bg-base-100 shadow-sm"
    >
      <!-- <div class="flex items-center gap-2">
        < -->
      <h2 class="font-semibold">All Issues</h2>
      <!-- </div> -->
      <div class="flex gap-2">
        <label class="input border-0">
          <svg
            class="h-[1em] opacity-50"
            xmlns="http://www.w3.org/2000/svg"
            viewBox="0 0 24 24"
          >
            <g
              stroke-linejoin="round"
              stroke-linecap="round"
              stroke-width="2.5"
              fill="none"
              stroke="currentColor"
            >
              <circle cx="11" cy="11" r="8"></circle>
              <path d="m21 21-4.3-4.3"></path>
            </g>
          </svg>
          <input
            id="search_input"
            type="search"
            required
            placeholder="search issues....."
          />
        </label>
        <button id="search_btn" class="btn btn-primary">search</button>
        <!-- <div class="dropdown dropdown-end">
          <div
            tabindex="0"
            role="button"
            class="btn btn-ghost btn-circle avatar"
          >
            <div class="w-10 rounded-full">
              <img
                alt="Tailwind CSS Navbar component"
                src="https://img.daisyui.com/images/stock/photo-1534528741775-53994a69daeb.webp"
              />
            </div>
          </div>
          <ul
            tabindex="-1"
            class="menu menu-sm dropdown-content bg-base-100 rounded-box z-1 mt-3 w-52 p-2 shadow"
          >
            <li>
              <a class="justify-between">
                Profile
                <span class="badge">New</span>
              </a>
            </li>
            <li><a>Settings</a></li>
            <li><a>Logout</a></li>
          </ul>
        </div> -->
      </div>
    </div>

    <div class="flex w-3/11 ml-16 mt-12 gap-3">
      <button
        id="button_all"
        onclick="loadjson('button_all')"
        class="btn w-1/3"
      >
        All
      </button>
      <button id="open" onclick="loadjson('open')" class="btn w-1/3">
        Open
      </button>
      <button id="closed" onclick="loadjson('closed')" class="btn w-1/3">
        Closed
      </button>
    </div>
    <div class="flex w-11/12 mx-auto mt-12 justify-between">
      <div class="flex gap-3 items-center">
        <div><img src="assets/Aperture.png" alt="" /></div>
        <div>
          <p class="font-bold"><span id="card_count">50</span> Issues</p>
          <p class="text-sm">Track and manage your project issues</p>
        </div>
      </div>
      <div class="flex gap-2 items-center">
        <div class="w-2 h-2 bg-green-500 rounded-full"></div>
        <p>open</p>
        <div class="w-2 h-2 bg-purple-500 rounded-full"></div>
        <p>closed</p>
      </div>
    </div>
    <div id="spinner" class="flex justify-center items-center hidden">
      <span class="loading loading-bars loading-xl"></span>
    </div> 

    <section
      id="card_container"
      class="w-11/12 mx-auto grid grid-cols-4 mt-10 gap-3"
    ></section>

    <!-- Open the modal using ID.showModal() method -->
    <!-- <button class="btn" onclick="my_modal_1.showModal()">open modal</button> -->
    <dialog id="my_modal_1" class="modal">
      <div class="modal-box">
        <div id="details_container"></div>
        <div class="modal-action">
          <form method="dialog">
            <!-- if there is a button in form, it will close the modal -->
            <button class="btn btn-primary">Close</button>
          </form>
        </div>
      </div>
    </dialog>
    <script src="script.js"></script>
  </body>
</html>
