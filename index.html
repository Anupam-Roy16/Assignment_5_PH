<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>github issue tracker</title>

    <!-- font-awesome integrate-->
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
      integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
      crossorigin="anonymous"
      referrerpolicy="no-referrer"
    />

    <!-- font-integrate -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Geist:wght@100..900&display=swap"
      rel="stylesheet"
    />

    <!-- tailwid+daisyui -->
    <link
      href="https://cdn.jsdelivr.net/npm/daisyui@5"
      rel="stylesheet"
      type="text/css"
    />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <style>
      * {
        font-family: "Geist", sans-serif;
      }
    </style>
  </head>
  <body class="bg-[#F8FAFC]">
    <!-- <header class=" border"> -->
      <fieldset
        class="mx-auto w-1/3 mt-10 fieldset bg-base-200 border-base-300 rounded-box w-xs border p-4"
      >
        <img class="mx-auto" src="assets/github-logo.png" alt="" />
        <h2 class="text-center font-bold text-xl">GitHub Issues Tracker</h2>
        <h4 class="text-center">Sign in to manage your issues</h4>
        <!-- <legend class="fieldset-legend">Login</legend> -->

        <p class="label font-extrabold">Username</p>
        <input id="username_input" class="border-0" type="email" class="input" placeholder="Enter Username" />
        <p class="font-light">default: admin</p>
        <label class="label font-extrabold text-sm mt-2">Password</label>
        <input id="password_input" class="border-0" type="password" class="input" placeholder="Enter Password" />
        <p>default: admin123</p>
        <button id="sign_in_btn" class="bg-primary border-0 btn btn-neutral mt-4">Sign in</button>
        <p class="text-center">OR</p>
        <p class="text-center">Demo Credentials</p>
        <p class="text-center"><span class="font-bold">Username:</span> admin</p>
        <p class="text-center"><span class="font-bold">Password:</span> admin123</p>
    </fieldset>
    <!-- </header> -->
     <script src="log-in.js"></script>
  </body>
</html>
